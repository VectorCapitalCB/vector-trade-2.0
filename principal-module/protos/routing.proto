	SecurityExchangeRouting securityExchange = 207;
	string icebergPercentage = 225;
	string basketID = 227;
	double spread = 229;
	double limit = 230;
	bool hideOrder = 231;
	string codeOperator = 232;
	StrategyOrder strategyOrder = 233;
	ExStrategy exStrategy = 228;
	double riskRate = 1190;
	string clOrdLinkID = 583;
	double amount = 584;
	string folio = 5463;
	string contraBroker = 375;
	string contraTrader = 337;
	string securityID = 48;

	string commission = 49;
	string commission_type = 50;
	string icebergValue = 226;

	google.protobuf.Timestamp effectiveTime = 168;
	google.protobuf.Timestamp expireTime = 126;

	}


message TradeExecution {
